query CartTransformRunInput {
  cart {
    buyerIdentity {
      customer {
        tierMetafield: metafield(namespace: "custom", key: "tier") {
          value
        }
        tierTags: hasTags(tags: ["wholesale", "retail", "vip"]) {
          tag
          hasTag
        }
      }
    }
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
          currencyCode
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            retail: metafield(namespace: "custom", key: "retail") {
              type
              value
            }
            vip: metafield(namespace: "custom", key: "vip") {
              type
              value
            }
            wholesale: metafield(namespace: "custom", key: "wholesale") {
              type
              value
            }
          }
        }
      }
    }
  }
}
