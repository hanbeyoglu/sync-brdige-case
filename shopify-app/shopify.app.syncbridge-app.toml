client_id = "79283ef913700ce71bdd779e6644dad2"
name = "SyncBridge App"
application_url = "https://syncbridge.hanbeyoglu.com"
embedded = true

[build]
automatically_update_urls_on_dev = false

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "orders/create" ]
  uri = "/webhooks/orders/create"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_cart_transforms,read_customers,read_discounts,read_inventory,read_metaobject_definitions,read_metaobjects,read_orders,read_products,write_cart_transforms,write_customers,write_discounts,write_inventory,write_metaobject_definitions,write_metaobjects,write_orders,write_products"


[auth]
redirect_urls = [
  "https://syncbridge.hanbeyoglu.com/auth/callback",
  "https://syncbridge.hanbeyoglu.com/auth/shopify/callback",
  "https://syncbridge.hanbeyoglu.com/api/auth"
]
