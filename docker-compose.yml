version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sync-bridge-backend
    ports:
      - '8001:8000'
    volumes:
      - ./backend:/var/www/html
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/html/database/database.sqlite
    command: php artisan serve --host=0.0.0.0

  shopify-app:
    build:
      context: ./shopify-app
      dockerfile: Dockerfile
    container_name: sync-bridge-shopify
    ports:
      - '3005:3000'
    env_file:
      - ./shopify-app/.env
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
